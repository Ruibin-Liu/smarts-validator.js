<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMARTS Validator - Demo</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        h1 { color: #333; }
        .input-group {
            margin: 20px 0;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: monospace;
        }
        button {
            background: #0066cc;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #0052a3;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            font-family: monospace;
            white-space: pre-wrap;
        }
        .valid {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .invalid {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        .examples {
            margin-top: 30px;
        }
        .example {
            display: inline-block;
            background: #f0f0f0;
            padding: 5px 10px;
            margin: 5px;
            border-radius: 3px;
            cursor: pointer;
            font-family: monospace;
            font-size: 14px;
        }
        .example:hover {
            background: #e0e0e0;
        }
    </style>
</head>
<body>
    <h1>SMARTS Validator Demo</h1>
    
    <div class="input-group">
        <label for="smarts-input">Enter SMARTS pattern:</label>
        <input type="text" id="smarts-input" placeholder="e.g., [#6][CX3](=O)" value="[#6][CX3](=O)">
        <button onclick="validate()">Validate</button>
    </div>
    
    <div id="result" class="result" style="display: none;"></div>
    
    <div class="examples">
        <h3>Example Patterns (click to try):</h3>
        <div>
            <span class="example" onclick="setExample('[#6][CX3](=O)')">Aldehyde/Ketone</span>
            <span class="example" onclick="setExample('c[OH]')">Phenol</span>
            <span class="example" onclick="setExample('C1CCCCC1')">Cyclohexane</span>
            <span class="example" onclick="setExample('[#6]O[#6]')">Ether</span>
            <span class="example" onclick="setExample('CCO>>CC=O')">Reaction SMARTS</span>
            <span class="example" onclick="setExample('[C:1][OH:2]>>[C:1]=[O:2]')">Mapped Reaction</span>
        </div>
        <h3>Invalid Examples:</h3>
        <div>
            <span class="example" onclick="setExample('C1CC')">Unclosed Ring</span>
            <span class="example" onclick="setExample('C C')">Whitespace</span>
            <span class="example" onclick="setExample('[#0]')">Invalid Atomic #</span>
            <span class="example" onclick="setExample('C(=)O')">Empty Bond</span>
        </div>
    </div>

    <script src="../src/smarts-validator.js"></script>
    <script>
        function validate() {
            const input = document.getElementById('smarts-input').value;
            const resultDiv = document.getElementById('result');
            
            const result = SMARTSValidator.validateSMARTS(input);
            
            resultDiv.style.display = 'block';
            resultDiv.className = 'result ' + (result.valid ? 'valid' : 'invalid');
            
            let output = 'Valid: ' + result.valid + '\n';
            output += 'Kind: ' + (result.kind || 'null') + '\n';
            
            if (result.errors.length > 0) {
                output += '\nErrors:\n' + result.errors.join('\n');
            }
            
            resultDiv.textContent = output;
        }
        
        function setExample(value) {
            document.getElementById('smarts-input').value = value;
            validate();
        }
        
        // Validate on Enter key
        document.getElementById('smarts-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                validate();
            }
        });
        
        // Initial validation
        validate();
    </script>
</body>
</html>
